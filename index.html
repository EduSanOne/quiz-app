<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="screen active screen-start">
            <h1>Quiz Time!</h1>
            <p>Test your knowledge wit these fun questions</p>
            <button id="start-btn">Start Quiz</button>
        </div>

        <div class="screen screen-questions">
            <h3 id="question">Question goes here</h3>
            <div class="info-part">
                <p>Question <span id="current-question">1</span> of <span id="max-question">5</span></p> 
                <p>Score: <span id="score">0</span></p>
            </div>
            <div class="only-aswers">
                the aswers go here
            </div>
            <div class="progress-bar">
                <div class="progress"></div>
            </div>
        </div>

        <div class="screen screen-result">
            <h1>Quiz Results</h1>
            <div class="result-container">
                <p>You scored <span>3</span> out of <span>5</span></p>
                <h3>Good effort! Keep learning!</h3>
            </div>
            <button id="restart-btn">Restart Quiz</button>
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
